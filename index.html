<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CatVTON Try-On</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-label="CatVTON Try-On">
        <form id="tryon-form" class="controls">
          <header class="topbar">
            <div>
              <h1>CatVTON Try-On</h1>
              <p>A100 inference console</p>
            </div>
            <button id="submit-button" type="submit">Run</button>
          </header>

          <div class="upload-grid">
            <label class="upload-card">
              <span>Person</span>
              <input id="person-input" name="person" type="file" accept="image/*" required />
              <img id="person-preview" alt="" />
            </label>

            <label class="upload-card">
              <span>Cloth</span>
              <input id="cloth-input" name="cloth" type="file" accept="image/*" required />
              <img id="cloth-preview" alt="" />
            </label>
          </div>

          <div class="settings">
            <label>
              <span>Type</span>
              <select id="cloth-type" name="cloth_type">
                <option value="upper">Upper</option>
                <option value="lower">Lower</option>
                <option value="overall">Overall</option>
              </select>
            </label>

            <label>
              <span>Steps</span>
              <input id="steps" name="num_inference_steps" type="number" min="1" max="100" value="50" />
            </label>

            <label>
              <span>Guidance</span>
              <input id="guidance" name="guidance_scale" type="number" min="0" max="20" step="0.1" value="2.5" />
            </label>

            <label>
              <span>Seed</span>
              <input id="seed" name="seed" type="number" value="-1" />
            </label>
          </div>

          <p id="status" class="status">Ready</p>
        </form>

        <section class="result-pane" aria-label="Result">
          <div class="result-main">
            <img id="result-image" alt="" />
            <div id="placeholder" class="placeholder">Result</div>
          </div>
          <div class="thumbs">
            <button class="thumb active" data-image="result">Result</button>
            <button class="thumb" data-image="masked">Mask</button>
            <button class="thumb" data-image="grid">Grid</button>
          </div>
        </section>
      </section>
    </main>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
